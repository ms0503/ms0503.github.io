    <body>
        <main>
            <h1>こでまり日記</h1>
            <article>
                <div id="contents"></div>
            </article>
        </main>
        <footer>
            <div id="footer"></div>
        </footer>
        <script>
            if(getQueryParams(location.search)['p'] !== undefined && parseInt(getQueryParams(location.search)['p'], 10) !== NaN) $.ajax({
                dataType: 'html',
                type: 'GET',
                url: `/kodemari/${getQueryParams(location.search)['p']}.html`
            }).done(data => {
                let temp = data.split(/\n/);
                let temp1 = `
                    <h2>${temp[0]}</h2>
                    <pre class="${temp[1]}">${temp.slice(2).join('\n')}</pre>
                `;
                $('#contents').html(temp1);
            }).fail((xhr, stat, err) => $('#contents').html('<p>読み込みに失敗しました。</p>'));
            else $('#contents').html(`
                <h2>一覧</h2>
                <ul>
                    <li><a href="/kodemari/?p=chara">登場人物</a></li>
                    <li><a href="/kodemari/?p=1">第一話「きのこ」</a></li>
                </ul>
            `);
            $.ajax({
                dataType: 'html',
                type: 'GET',
                url: '/footer.html'
            }).done(data => $('#footer').html(data)).fail((xhr, stat, err) => $('#footer').html('<p>読み込みに失敗しました。</p>'));
        </script>
    </body>
