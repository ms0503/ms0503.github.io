<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <base href="https://ms0503.github.io/" />
        <title>こでまり日記 - Sora Tonami(ms0503)</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="/js/lib.js"></script>
    </head>
    <body>
        <main>
            <h1>こでまり日記</h1>
            <article><div id="contents"></div></article>
        </main>
        <footer>
            <small>
                Copyright&#032;&copy;&#032;2021&#032;Sora&#032;Tonami.&#032;All&#032;rights&#032;reserved.<br />
                Text&#032;is&#032;available&#032;under&#032;the&#032;<a href="/fdl.html">GNU&#032;Free&#032;Document&#032;License&#032;1.3</a>
            </small>
        </footer>
        <script>
            if(getQueryParams(location.search)['p'] !== undefined && parseInt(getQueryParams(location.search)['p'], 10) !== NaN) $.ajax({
                dataType: 'html',
                type: 'GET',
                url: `${getQueryParams(location.search)['p']}.html`
            }).done(data => {
                let temp = data.split(/\n/);
                let temp1 = `
                    <h2>${temp[0]}</h2>
                    <pre>${temp.slice(1).join('')}</pre>
                `;
                $('#contents').html(temp1);
            }).fail((xhr, stat, err) => {
                $('#contents').html(`
                    <p>読み込みに失敗しました。</p>
                `);
            });
            else $('#contents').html(`
                <h2>一覧</h2>
                <ul>
                    <li><a href="/kodemari/?p=1">第一話「きのこ」</a></li>
                </ul>
            `);
        </script>
    </body>
</html>
